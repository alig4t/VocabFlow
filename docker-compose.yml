services:
  postgres:
    image: postgres:16-alpine
    container_name: eng1_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eng1_user
      POSTGRES_PASSWORD: eng1_pass
      POSTGRES_DB: english_learning
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
